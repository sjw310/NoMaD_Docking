# =============================================================
# NoMaD base code와 다른 부분
# - distance label max normalization 적용
# - waypoint 예측이 아닌 velocity 예측
# =============================================================

# nomad_train / nomad_test
project_name: nomad_train
# dist_max_norm : distance label max normalization / p : action prediction length / a : action_max_dist_cat / d : distance_max_dist_cat
run_name: nomad_pose_x_y_theta_context_spacing_10_p60_DiT_x_03_y_05_0328

# training setup
use_wandb: False # set to false if you don't want to log to wandb
train: True # train : True / test : False
batch_size: 8

epochs: 20
gpu_ids: [0]
num_workers: 1
lr: 1e-4
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True 
warmup_epochs: 4
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# Resume training from previous run
# load_run: nomad_train/nomad_pose_x_y_theta_encoder_context_spacing_10_p60_DiT_x_03_y_05_2026_07_06_00_56_25 # "nomad_train/~" # file path 지정

# load pretrained model for testing
#test_load_model: "nomad_train/~" # file path 지정

# model params
model_type: nomad
vision_encoder: nomad_vint
encoding_size: 256
obs_encoder: efficientnet-b0
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]

# diffusion model params
num_diffusion_iters: 100

# mask 
goal_mask_prob: 0.5

# normalization for the action space
normalize: True # used min-max norm, scaled to [-1,1] (maybe same as the NoMaD)

# context
context_type: temporal
context_size: 5 # 3 or 5

# default는 1e-4, 대신 distance 정규화 안함
alpha: 0.4 # dist_loss * alpha + action_loss * (1-alpha)

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: 0
  max_dist_cat: 5
action:
  min_dist_cat: 0
  max_dist_cat: 5

# action output params
len_traj_pred: 60
learn_angle: False # related to the waypoint prediction case, not the velocity one.

# velocity를 direct로 predict 할지 혹은 NoMaD 방식의 상대 이동량을 따를지
predict_velocity : True

# dataset specific parameters
image_size: [320, 240] # width, height

# to constrain camera numbers
data_image_keys:
  - image_bottom
  #- image_top
  #- camera_right
  #- camera_left

chunk_size: 60 # chunk size for the dataset

use_encoder: False
use_imu: False
use_lidar: False
return_sensor_history: False

encoder_imu_context_size: 30
encoder_imu_context_spacing: 1

lidar_context_size: 5
lidar_context_spacing: 6

action_stats_percent_99: False
pose_stats_percent_99: False

datasets:
  episode_postech_dock:
    format: h5
    
    h5_datasets:
      - h5_path: /home/sjw00310/Desktop/diffusion_policy_robot_docking/dataset/h5_dataset/train_episode_postech_260328_dock.h5
        image_keys:
          - image_bottom
          #- image_top
          #- camera_right
          #- camera_rear

        action_key: "encoder"
        encoder_key: null # "encoder"
        imu_key: null
        lidar_key: null

        exclude_train_episode_nums: [10,12,25,33,38]

