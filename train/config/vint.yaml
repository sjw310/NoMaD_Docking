# logging stuff
## =0 turns off
# in iterations → batch 기준
# in epochs → epoch 기준
print_log_freq: 100 # in iterations # frequency of printing to console
image_log_freq: 0 #0 # in iterations # frequency of logging images to wandb
num_images_log: 0 #0  # number of images to log to wandb
pairwise_test_freq: 0 # in epochs 
eval_fraction: 0.25 # fraction of training data to use for evaluation
wandb_log_freq: 10 # in iterations
eval_freq: 1 # in epochs