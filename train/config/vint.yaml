project_name: vint-release
run_name: vint-5c

# training setup
use_wandb: False # set to false if you don't want to log to wandb
train: True
batch_size: 8
epochs: 100
gpu_ids: [0] # 다중 GPU면 gpu_ids: [0,1]
num_workers: 1
lr: 5e-4
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine" # lr scheduler
warmup: True 
warmup_epochs: 4
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# model params
model_type: vint
obs_encoder: "efficientnet-b0" # by default, this is imagenet pretrained
obs_encoding_size: 512
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
late_fusion: False

# normalization for the action space
normalize: True

predict_velocity : True

# context
context_type: temporal
context_size: 5 # 현재 시점을 포함해서 몇 개의 과거 observation(프레임)을 모델 입력으로 사용할지

# tradeoff between action and distance prediction loss
alpha: 0.5 

# distance bounds for distance and action and distance predictions 
# 현재 시점 o_t에서 미래 시점 o_t+d까지의 거리를 예측할 때:
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 0
  max_dist_cat: 10
# subgoal sampling 시 가까운 목표 / 먼 목표를 나누는 기준
close_far_threshold: 10 # distance threshold used to seperate the close and the far subgoals that are sampled per datapoint

# action output params
len_traj_pred: 5
learn_angle: False # whether to learn the angle or not

# dataset specific parameters
image_size: [320, 240] # width, height
goal_type: "image"

datasets:
  my_h5_dataset:
    format: h5
    h5_path: "/home/sjw00310/Desktop/diffusion_policy_robot_docking/dataset/h5_dataset/train_episode_postech_260330.h5"

    image_key: "image_bottom"
    action_key: "encoder"

    test_ratio: 0.2

    waypoint_spacing: 6 # waypoint 몇 step 간격으로 사용할지
    end_slack: 0 # trajectory 끝부분을 얼마나 버릴지
    negative_mining: False # negative sample(틀린 goal)을 사용할지 여부
    goals_per_obs: 1 # observation 하나당 몇 개 goal 샘플 생성할지


